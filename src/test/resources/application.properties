quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.rest-client.ip-api.url=http://localhost:1
quarkus.rest-client.time-api.url=http://localhost:1
quarkus.rest-client.ip-api.scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client.time-api.scope=jakarta.enterprise.context.ApplicationScoped
